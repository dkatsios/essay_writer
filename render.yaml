# Render Blueprint: https://render.com/docs/infrastructure-as-code
# After connecting this repo, use "Apply" from the Blueprint or create a Web Service
# that uses this file. This Docker entrypoint starts only the web app; start
# workers separately with `uv run python -m src.start_workers 6` (or your chosen
# count) in your worker environment.

services:
  - type: web
    name: essay-writer
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: GOOGLE_API_KEY
        sync: false
      - key: SEMANTIC_SCHOLAR_API_KEY
        sync: false
      - key: ESSAY_WRITER_DATABASE__URL
        sync: false
      # Optional: undownloaded finished jobs are deleted after this many seconds (default 86400).
      # - key: ESSAY_WEB_JOB_TTL_SECONDS
      #   value: "86400"
      # - key: ESSAY_WEB_JOB_SWEEP_INTERVAL_SECONDS
      #   value: "300"
