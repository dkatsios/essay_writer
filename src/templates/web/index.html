<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essay Writer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    label { display: block; font-weight: 600; margin-top: 1rem; margin-bottom: .3rem; }
    textarea { width: 100%; min-height: 100px; padding: .5rem; border: 1px solid #ccc; border-radius: 6px; font-size: .95rem; resize: vertical; }
    input[type="file"], input[type="number"] { padding: .4rem; border: 1px solid #ccc; border-radius: 6px; font-size: .95rem; }
    input[type="number"] { width: 140px; }
    button { margin-top: 1.2rem; padding: .6rem 1.6rem; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #1d4ed8; }
    #status-area { margin-top: 1.5rem; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #ccc; border-top-color: #2563eb; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: .5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .question-block { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 1rem; margin-bottom: .75rem; }
    .question-block p { margin: 0 0 .5rem; font-weight: 600; }
    .question-block.answered .user-answer { margin: .5rem 0 0; font-weight: 500; color: #166534; }
    .clarifications-round { margin-bottom: 1rem; }
    .clarifications-round > h3 { font-size: 1.05rem; margin: 0 0 .75rem; color: #334155; }
    .pipeline-status { margin-top: .75rem; padding-top: .75rem; border-top: 1px solid #e2e8f0; }
    .question-block label { font-weight: 400; margin-top: .2rem; cursor: pointer; }
    .error { color: #dc2626; font-weight: 600; }
    .download-link { display: inline-block; margin-top: .5rem; padding: .5rem 1.2rem; background: #16a34a; color: #fff; text-decoration: none; border-radius: 6px; }
    .download-link:hover:not(:disabled) { background: #15803d; }
    .download-link:disabled { opacity: .85; cursor: wait; }
    .hint { font-size: .85rem; color: #64748b; margin-top: .2rem; }
    .job-gone { color: #334155; font-weight: 600; margin-top: .5rem; }
    .optional-pdf-row { border: 1px solid #e2e8f0; border-radius: 6px; padding: .75rem 1rem; margin-bottom: .65rem; background: #fafafa; }
    .optional-pdf-row h4 { margin: 0 0 .35rem; font-size: .95rem; font-weight: 600; }
    .optional-pdf-row .doi-line { font-size: .85rem; margin-bottom: .5rem; }
    .optional-pdf-row .doi-line a { color: #2563eb; }
    .optional-pdf-row .upload-row { display: flex; flex-wrap: wrap; align-items: center; gap: .35rem .5rem; margin-top: .35rem; }
    .optional-pdf-row .upload-row .opt-or { color: #94a3b8; font-size: .8rem; user-select: none; padding: 0 .15rem; }
    .optional-pdf-row .opt-pdf-url { flex: 1 1 10rem; min-width: 0; max-width: 100%; padding: .3rem .45rem; border: 1px solid #cbd5e1; border-radius: 4px; font-size: .85rem; }
    .optional-pdf-row .upload-status { font-size: .85rem; color: #166534; flex: 1 1 100%; }
    .optional-pdf-row .upload-status.err { color: #b91c1c; }
  </style>
</head>
<body>
  <h1>📝 Essay Writer</h1>

  <form id="form" autocomplete="off">
    <label for="prompt">Prompt / Instructions</label>
    <textarea id="prompt" name="prompt" placeholder="Describe the essay topic or paste assignment instructions…"></textarea>

    <label for="files">Upload Files</label>
    <input type="file" id="files" name="files" multiple>
    <div class="hint">PDF, DOCX, images, or text files with assignment materials.</div>

    <label for="sources">Your Sources <span style="font-weight:400">(optional)</span></label>
    <input type="file" id="sources" name="sources" multiple>
    <div class="hint">PDF, DOCX, or text files of reference papers you want cited in the essay.</div>

    <label>Academic Level <span style="font-weight:400">(optional)</span></label>
    <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:.5rem">
      <label style="font-weight:400;cursor:pointer"><input type="radio" name="academic_level" value=""> Not defined</label>
      <label style="font-weight:400;cursor:pointer"><input type="radio" name="academic_level" value="undergraduate"> Undergraduate</label>
      <label style="font-weight:400;cursor:pointer"><input type="radio" name="academic_level" value="postgraduate"> Postgraduate</label>
    </div>

    <label for="target_words">Target Word Count <span style="font-weight:400">(optional)</span></label>
    <input type="number" id="target_words" name="target_words" min="100" step="100" placeholder="e.g. 3000">

    <label for="min_sources">Minimum Sources <span style="font-weight:400">(optional)</span></label>
    <input type="number" id="min_sources" name="min_sources" min="1" max="100" step="1" placeholder="e.g. 10">

    <button type="submit" id="submit-btn">Generate Essay</button>
  </form>

  <div id="status-area"></div>

  <script>
    const form = document.getElementById('form');
    const statusArea = document.getElementById('status-area');
    const submitBtn = document.getElementById('submit-btn');
    let jobId = null;
    let pollTimer = null;
    let downloadInProgress = false;
    /** Read-only HTML for submitted Q&A rounds; kept visible while the pipeline runs. */
    let clarificationsHistoryHtml = '';
    let optionalPdfRoundItems = [];
    let optionalPdfUploaded = {};

    function resetFormToCleanState() {
      form.reset();
      const filesInput = document.getElementById('files');
      if (filesInput) filesInput.value = '';
    }

    window.addEventListener('load', () => {
      queueMicrotask(resetFormToCleanState);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      clarificationsHistoryHtml = '';
      statusArea.innerHTML = '<span class="spinner"></span> Submitting…';

      const fd = new FormData();
      fd.append('prompt', document.getElementById('prompt').value);
      const tw = document.getElementById('target_words').value;
      if (tw) fd.append('target_words', tw);
      const ms = document.getElementById('min_sources').value;
      if (ms) fd.append('min_sources', ms);
      const al = document.querySelector('input[name="academic_level"]:checked');
      if (al && al.value) fd.append('academic_level', al.value);
      const filesInput = document.getElementById('files');
      for (const f of filesInput.files) fd.append('files', f);
      const sourcesInput = document.getElementById('sources');
      for (const f of sourcesInput.files) fd.append('sources', f);

      try {
        const res = await fetch('/submit', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) { showError(data.error); return; }
        jobId = data.job_id;
        statusArea.innerHTML = '<span class="spinner"></span> Starting…';
        pollTimer = setInterval(pollStatus, 3000);
        void pollStatus();
      } catch (err) {
        showError('Failed to submit: ' + err.message);
      }
    });

    async function pollStatus() {
      if (!jobId) return;
      try {
        const res = await fetch(`/status/${jobId}`);
        if (res.status === 404) {
          clearInterval(pollTimer);
          showJobGone(
            'This job is no longer on the server (expired timeout or already cleaned up). If you already downloaded your ZIP, that is expected.'
          );
          return;
        }
        const data = await res.json();

        if (data.status === 'running') {
          const pipelineEl = statusArea.querySelector('.pipeline-status');
          const line = runningStatusHtml(data.stage);
          if (pipelineEl) {
            pipelineEl.innerHTML = line;
          } else if (!clarificationsHistoryHtml) {
            statusArea.innerHTML = line;
          }
        } else if (data.status === 'questions') {
          clearInterval(pollTimer);
          showQuestions(data.questions);
        } else if (data.status === 'optional_pdfs') {
          clearInterval(pollTimer);
          showOptionalPdfPrompt(data.optional_pdf_items || []);
        } else if (data.status === 'done') {
          clearInterval(pollTimer);
          statusArea.innerHTML =
            clarificationsHistoryHtml +
            '<p>✅ Essay generated!</p>' +
            '<button type="button" class="download-link" id="download-btn">Download ZIP</button>' +
            '<p class="hint">The server removes this package after you download it, or automatically after a timeout if you leave it here.</p>';
          submitBtn.disabled = false;
          const dl = document.getElementById('download-btn');
          if (dl) dl.addEventListener('click', () => { void downloadZip(); });
        } else if (data.status === 'error') {
          clearInterval(pollTimer);
          showError(data.error || 'Unknown error');
        }
      } catch (err) {
        /* ignore transient fetch errors */
      }
    }

    function showQuestions(questions) {
      let html = clarificationsHistoryHtml;
      html += '<h3>Assignment has gaps — please clarify:</h3>';
      html += '<div class="clarification-pending">';
      questions.forEach((q, i) => {
        html += `<div class="question-block"><p>${i + 1}. ${esc(q.question)}</p>`;
        q.options.forEach((opt, j) => {
          const letter = String.fromCharCode(97 + j);
          html += `<label><input type="radio" name="q${i + 1}" value="${letter}"> ${letter}) ${esc(opt)}</label>`;
        });
        const otherLetter = String.fromCharCode(97 + q.options.length);
        html += `<label style="display:flex;align-items:center;gap:.4rem"><input type="radio" name="q${i + 1}" value="other"> ${otherLetter}) Other: <input type="text" class="other-text" data-q="${i + 1}" placeholder="Type your answer…" style="flex:1;padding:.3rem .5rem;border:1px solid #ccc;border-radius:4px;font-size:.9rem"></label>`;
        html += '</div>';
      });
      html += '<button id="answer-btn" onclick="submitAnswers()">Submit Answers</button>';
      html += ' <button onclick="skipQuestions()" style="background:#64748b">Skip</button>';
      html += '</div>';
      statusArea.innerHTML = html;

      // Auto-select "other" radio when typing in the text field
      document.querySelectorAll('.other-text').forEach(input => {
        input.addEventListener('focus', () => {
          const radio = input.closest('label').querySelector('input[type=radio]');
          radio.checked = true;
        });
      });
    }

    async function submitAnswers() {
      const parts = [];
      document.querySelectorAll('.clarification-pending .question-block').forEach((block, i) => {
        const checked = block.querySelector('input[type=radio]:checked');
        if (checked) {
          if (checked.value === 'other') {
            const textInput = block.querySelector('.other-text');
            if (textInput && textInput.value.trim()) {
              parts.push(`${i + 1}. ${textInput.value.trim()}`);
            }
          } else {
            parts.push(`${i + 1}. ${checked.value}`);
          }
        }
      });
      await sendAnswers(parts.join(', '));
    }

    async function skipQuestions() {
      await sendAnswers('');
    }

    function appendClarificationsSnapshot() {
      const blocks = document.querySelectorAll('#status-area .clarification-pending .question-block');
      if (!blocks.length) return;
      let html = '<section class="clarifications-round"><h3>Your clarifications</h3>';
      blocks.forEach((block) => {
        const qText = block.querySelector('p')?.textContent || '';
        const checked = block.querySelector('input[type=radio]:checked');
        let ans = '—';
        if (checked) {
          if (checked.value === 'other') {
            const textInput = block.querySelector('.other-text');
            const t = textInput?.value.trim();
            ans = t || '(Other — empty)';
          } else {
            const lab = checked.closest('label');
            let t = lab ? lab.textContent.trim() : '';
            ans = t.replace(/^[a-z]\)\s*/i, '').trim() || checked.value;
          }
        }
        html += `<div class="question-block answered"><p>${esc(qText)}</p><p class="user-answer">${esc(ans)}</p></div>`;
      });
      html += '</section>';
      clarificationsHistoryHtml += html;
    }

    async function sendAnswers(answers) {
      appendClarificationsSnapshot();
      const fd = new FormData();
      fd.append('answers', answers);
      await fetch(`/answer/${jobId}`, { method: 'POST', body: fd });
      statusArea.innerHTML =
        clarificationsHistoryHtml +
        '<div class="pipeline-status"><span class="spinner"></span> Starting…</div>';
      pollTimer = setInterval(pollStatus, 3000);
      void pollStatus();
    }

    function showOptionalPdfPrompt(items) {
      optionalPdfRoundItems = items;
      optionalPdfUploaded = {};
      let html = clarificationsHistoryHtml;
      html += '<h3>Optional: upload full-text PDFs</h3>';
      html += '<p class="hint">These sources were used with metadata or abstract only. Add a PDF from your device or paste a direct PDF link (e.g. open access). Optional.</p>';
      html += '<div class="clarification-pending optional-pdf-pending">';
      items.forEach((row, idx) => {
        const title = esc(row.title || row.source_id);
        const doiUrl = row.doi_url ? esc(row.doi_url) : '';
        const doiLabel = row.doi ? esc(row.doi) : '';
        html += `<div class="optional-pdf-row" data-idx="${idx}">`;
        html += `<h4>${title}</h4>`;
        if (doiUrl) {
          html += `<div class="doi-line"><a href="${doiUrl}" target="_blank" rel="noopener noreferrer">DOI: ${doiLabel || doiUrl}</a></div>`;
        }
        html += `<div class="upload-row">`;
        html += `<input type="file" accept=".pdf,application/pdf" class="opt-pdf-file" data-idx="${idx}" title="PDF file" />`;
        html += `<button type="button" class="opt-pdf-upload-btn" data-idx="${idx}">Upload</button>`;
        html += `<span class="opt-or">or</span>`;
        html += `<input type="url" inputmode="url" autocomplete="off" class="opt-pdf-url" data-idx="${idx}" placeholder="https://…pdf" />`;
        html += `<button type="button" class="opt-pdf-url-btn" data-idx="${idx}">Fetch</button>`;
        html += `<span class="upload-status opt-pdf-status" data-idx="${idx}"></span>`;
        html += `</div></div>`;
      });
      html += '<button type="button" id="optional-pdf-continue">Continue</button>';
      html += ' <button type="button" id="optional-pdf-continue-skip" style="background:#64748b">Skip (no uploads)</button>';
      html += '</div>';
      statusArea.innerHTML = html;

      document.querySelectorAll('.opt-pdf-upload-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.getAttribute('data-idx'), 10);
          const row = items[idx];
          if (!row) return;
          const sid = row.source_id;
          const fileInput = document.querySelector(`.opt-pdf-file[data-idx="${idx}"]`);
          const st = document.querySelector(`.opt-pdf-status[data-idx="${idx}"]`);
          if (!fileInput || !fileInput.files || !fileInput.files[0]) {
            if (st) { st.textContent = 'Choose a file first.'; st.classList.add('err'); }
            return;
          }
          void uploadOptionalPdf(sid, fileInput.files[0], st, fileInput);
        });
      });
      document.querySelectorAll('.opt-pdf-url-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.getAttribute('data-idx'), 10);
          const row = items[idx];
          if (!row) return;
          const sid = row.source_id;
          const urlInput = document.querySelector(`.opt-pdf-url[data-idx="${idx}"]`);
          const st = document.querySelector(`.opt-pdf-status[data-idx="${idx}"]`);
          const u = urlInput && urlInput.value.trim();
          if (!u) {
            if (st) { st.textContent = 'Paste a PDF URL.'; st.classList.add('err'); }
            return;
          }
          void fetchOptionalPdfUrl(sid, u, st, urlInput);
        });
      });
      const cont = document.getElementById('optional-pdf-continue');
      const skip = document.getElementById('optional-pdf-continue-skip');
      if (cont) cont.addEventListener('click', () => { void finishOptionalPdfStep(); });
      if (skip) skip.addEventListener('click', () => { void finishOptionalPdfStep(); });
    }

    async function uploadOptionalPdf(sourceId, file, statusEl, fileInput) {
      if (!statusEl) return;
      statusEl.classList.remove('err');
      statusEl.textContent = 'Uploading…';
      const fd = new FormData();
      fd.append('source_id', sourceId);
      fd.append('file', file);
      try {
        const res = await fetch(`/optional-pdf/${jobId}`, { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          statusEl.textContent = data.error || 'Upload failed';
          statusEl.classList.add('err');
          return;
        }
        optionalPdfUploaded[sourceId] = 'file';
        statusEl.textContent = 'Saved — full text will be used.';
        statusEl.classList.remove('err');
        if (fileInput) fileInput.value = '';
      } catch (e) {
        statusEl.textContent = 'Network error';
        statusEl.classList.add('err');
      }
    }

    async function fetchOptionalPdfUrl(sourceId, url, statusEl, urlInput) {
      if (!statusEl) return;
      statusEl.classList.remove('err');
      statusEl.textContent = 'Fetching…';
      const fd = new FormData();
      fd.append('source_id', sourceId);
      fd.append('pdf_url', url);
      try {
        const res = await fetch(`/optional-pdf/${jobId}`, { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          statusEl.textContent = data.error || 'Fetch failed';
          statusEl.classList.add('err');
          return;
        }
        optionalPdfUploaded[sourceId] = 'url';
        statusEl.textContent = 'Saved — full text will be used.';
        statusEl.classList.remove('err');
        if (urlInput) urlInput.value = '';
      } catch (e) {
        statusEl.textContent = 'Network error';
        statusEl.classList.add('err');
      }
    }

    function appendOptionalPdfSnapshot() {
      const pending = document.querySelector('.optional-pdf-pending');
      if (!pending || !optionalPdfRoundItems.length) return;
      let html = '<section class="clarifications-round"><h3>Optional PDFs</h3>';
      optionalPdfRoundItems.forEach((row) => {
        const sid = row.source_id;
        const how = optionalPdfUploaded[sid];
        let ans = '— skipped / none';
        if (how === 'file') ans = 'PDF from file';
        else if (how === 'url') ans = 'PDF from URL';
        html += `<div class="question-block answered"><p>${esc(row.title || sid)}</p><p class="user-answer">${esc(ans)}</p></div>`;
      });
      html += '</section>';
      clarificationsHistoryHtml += html;
    }

    async function finishOptionalPdfStep() {
      appendOptionalPdfSnapshot();
      await fetch(`/optional-pdf/${jobId}/done`, { method: 'POST' });
      statusArea.innerHTML =
        clarificationsHistoryHtml +
        '<div class="pipeline-status"><span class="spinner"></span> Reading sources…</div>';
      pollTimer = setInterval(pollStatus, 3000);
      void pollStatus();
    }

    function showError(msg) {
      clearInterval(pollTimer);
      statusArea.innerHTML =
        clarificationsHistoryHtml + `<p class="error">❌ ${esc(msg)}</p>`;
      submitBtn.disabled = false;
    }

    function showJobGone(msg) {
      clearInterval(pollTimer);
      statusArea.innerHTML =
        clarificationsHistoryHtml +
        `<p class="job-gone">${esc(msg)}</p>`;
      submitBtn.disabled = false;
      jobId = null;
    }

    async function downloadZip() {
      if (!jobId || downloadInProgress) return;
      downloadInProgress = true;
      const btn = document.getElementById('download-btn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Preparing…';
      }
      try {
        const res = await fetch(`/download/${jobId}`);
        if (res.status === 404) {
          showJobGone(
            'Download is no longer available. The job may have expired or was already downloaded.'
          );
          return;
        }
        if (!res.ok) {
          showError('Download failed (' + res.status + '). Try again or start a new run.');
          return;
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'essay_' + jobId + '.zip';
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        statusArea.innerHTML =
          clarificationsHistoryHtml +
          '<p>✅ Download started. You can submit another essay when you are ready.</p>';
        jobId = null;
        submitBtn.disabled = false;
      } catch (err) {
        showError('Download failed: ' + err.message);
      } finally {
        downloadInProgress = false;
        if (btn && document.body.contains(btn)) {
          btn.disabled = false;
          btn.textContent = 'Download ZIP';
        }
      }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    /** Map server pipeline step id to a short UI label. */
    function formatStage(raw) {
      if (!raw || raw === 'unknown') return 'Working';
      const w = /^write:(\d+)$/.exec(raw);
      if (w) return 'Writing (section ' + w[1] + ')';
      const r = /^review:(\d+)$/.exec(raw);
      if (r) return 'Reviewing (section ' + r[1] + ')';
      const labels = {
        intake: 'Intake',
        validate: 'Validation',
        plan: 'Planning',
        research: 'Research',
        read_sources: 'Reading sources',
        write: 'Writing',
        review: 'Reviewing',
        export: 'Exporting',
      };
      if (labels[raw]) return labels[raw];
      return raw.replace(/_/g, ' ');
    }

    function runningStatusHtml(stage) {
      return '<span class="spinner"></span> ' + esc(formatStage(stage)) + '…';
    }
  </script>
</body>
</html>
