<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essay Writer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root {
      --bg: #f1f5f9;
      --surface: #ffffff;
      --text: #0f172a;
      --text-muted: #475569;
      --border: #cbd5e1;
      --border-focus: #2563eb;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --radius: 10px;
      --shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 8px 24px rgba(15, 23, 42, 0.06);
    }
    html { color-scheme: light; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      max-width: 42rem;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
      color: var(--text);
      background: var(--bg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    .page-header { margin-bottom: 1.5rem; }
    h1 { font-size: 1.375rem; font-weight: 700; letter-spacing: -0.02em; margin: 0; color: var(--text); }
    .form-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(148, 163, 184, 0.35);
      padding: 1.5rem 1.35rem 1.65rem;
    }
    @media (min-width: 480px) {
      .form-card { padding: 1.75rem 1.75rem 1.85rem; }
    }
    label.field-label { display: block; font-weight: 600; font-size: .9rem; margin-top: 1.15rem; margin-bottom: .4rem; color: var(--text); }
    label.field-label:first-of-type { margin-top: 0; }
    .optional-mark { font-weight: 500; color: var(--text-muted); }
    textarea {
      width: 100%;
      min-height: 7.5rem;
      padding: .65rem .75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      resize: vertical;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    textarea:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
    .file-zone {
      display: block;
      padding: .65rem .75rem;
      border: 1px dashed var(--border);
      border-radius: 8px;
      background: #f8fafc;
      transition: border-color .15s, background .15s;
    }
    .file-zone:focus-within { border-color: var(--border-focus); background: #f1f5f9; }
    input[type="file"] {
      width: 100%;
      font-size: .875rem;
      color: var(--text-muted);
    }
    input[type="number"] {
      width: 100%;
      max-width: 11rem;
      padding: .55rem .65rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="number"]:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
    .hint { font-size: .8125rem; color: var(--text-muted); margin-top: .35rem; line-height: 1.4; }
    .config-section {
      margin-top: 1.35rem;
      padding-top: 1.25rem;
      border-top: 1px solid #e2e8f0;
    }
    .config-section-title {
      font-size: .75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-muted);
      margin: 0 0 .85rem;
    }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    @media (min-width: 520px) {
      .radio-group { flex-direction: row; flex-wrap: wrap; gap: .65rem 1.25rem; }
    }
    .radio-option {
      display: flex;
      align-items: center;
      gap: .45rem;
      font-weight: 500;
      font-size: .9rem;
      color: var(--text);
      margin: 0;
      cursor: pointer;
    }
    .radio-option input { width: 1rem; height: 1rem; accent-color: var(--accent); cursor: pointer; }
    .checkbox-option {
      display: flex;
      align-items: flex-start;
      gap: .5rem;
      margin-top: .85rem;
      font-weight: 500;
      font-size: .9rem;
      color: var(--text);
      cursor: pointer;
    }
    .checkbox-option input { width: 1rem; height: 1rem; margin-top: .15rem; flex-shrink: 0; accent-color: var(--accent); cursor: pointer; }
    .number-row {
      display: grid;
      gap: 1rem 1.25rem;
      margin-top: 1.15rem;
    }
    @media (min-width: 480px) {
      .number-row { grid-template-columns: 1fr 1fr; }
    }
    .number-field .field-label { margin-top: 0; }
    .form-actions {
      margin-top: 1.75rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e2e8f0;
    }
    button.primary-submit {
      width: 100%;
      margin-top: 0;
      padding: .75rem 1.25rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
      transition: background .15s, transform .05s;
    }
    button.primary-submit:active:not(:disabled) { transform: scale(0.99); }
    button { margin-top: 1.2rem; padding: .6rem 1.6rem; background: #2563eb; color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #1d4ed8; }
    button.primary-submit:disabled { background: #94a3b8; }
    button.primary-submit:hover:not(:disabled) { background: var(--accent-hover); }
    #status-area { margin-top: 1.75rem; max-width: 42rem; margin-left: auto; margin-right: auto; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 3px solid #ccc; border-top-color: #2563eb; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: .5rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .question-block { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 1rem; margin-bottom: .75rem; }
    .question-block p { margin: 0 0 .5rem; font-weight: 600; }
    .question-block.answered .user-answer { margin: .5rem 0 0; font-weight: 500; color: #166534; }
    .clarifications-round { margin-bottom: 1rem; }
    .clarifications-round > h3 { font-size: 1.05rem; margin: 0 0 .75rem; color: #334155; }
    .pipeline-status { margin-top: .75rem; padding-top: .75rem; border-top: 1px solid #e2e8f0; }
    .clarification-pending .question-block label {
      display: flex;
      align-items: flex-start;
      gap: 0.45rem;
      margin-top: 0.45rem;
      cursor: pointer;
      font-weight: 400;
      line-height: 1.45;
    }
    .clarification-pending .question-block label:first-of-type { margin-top: 0.35rem; }
    .clarification-pending .question-block label > input[type="radio"] {
      flex-shrink: 0;
      margin-top: 0.12rem;
    }
    .clarification-pending .question-block label.other-row { align-items: center; flex-wrap: wrap; }
    .clarification-pending .question-block label.other-row > input[type="radio"] { margin-top: 0; }
    .error { color: #dc2626; font-weight: 600; }
    .download-link { display: inline-block; margin-top: .5rem; padding: .5rem 1.2rem; background: #16a34a; color: #fff; text-decoration: none; border-radius: 6px; }
    .download-link:hover:not(:disabled) { background: #15803d; }
    .download-link:disabled { opacity: .85; cursor: wait; }
    .hint { font-size: .85rem; color: #64748b; margin-top: .2rem; }
    .job-gone { color: #334155; font-weight: 600; margin-top: .5rem; }
    .optional-pdf-row { border: 1px solid #e2e8f0; border-radius: 6px; padding: .75rem 1rem; margin-bottom: .65rem; background: #fafafa; }
    .optional-pdf-row h4 { margin: 0 0 .35rem; font-size: .95rem; font-weight: 600; }
    .optional-pdf-row .doi-line { font-size: .85rem; margin-bottom: .5rem; }
    .optional-pdf-row .doi-line a { color: #2563eb; }
    .optional-pdf-row .upload-row { display: flex; flex-wrap: wrap; align-items: center; gap: .35rem .5rem; margin-top: .35rem; }
    .optional-pdf-row .upload-row .opt-or { color: #94a3b8; font-size: .8rem; user-select: none; padding: 0 .15rem; }
    .optional-pdf-row .opt-pdf-url { flex: 1 1 10rem; min-width: 0; max-width: 100%; padding: .3rem .45rem; border: 1px solid #cbd5e1; border-radius: 4px; font-size: .85rem; }
    .optional-pdf-row .upload-status { font-size: .85rem; color: #166534; flex: 1 1 100%; }
    .optional-pdf-row .upload-status.err { color: #b91c1c; }
    .job-session-bar {
      margin-top: 1.25rem;
      padding: .85rem 1rem;
      border-radius: var(--radius);
      border: 1px solid rgba(148, 163, 184, 0.45);
      background: #f8fafc;
      font-size: .875rem;
      color: var(--text-muted);
      line-height: 1.45;
    }
    .job-session-bar p { margin: 0 0 .65rem; }
    .job-session-bar button.secondary-link {
      margin-top: 0;
      padding: .4rem .85rem;
      font-size: .8125rem;
      background: #64748b;
    }
    .job-session-bar button.secondary-link:hover:not(:disabled) { background: #475569; }
    .resume-hint { margin-bottom: .65rem !important; }
  </style>
</head>
<body>
  <header class="page-header">
    <h1>📝 Essay Writer</h1>
  </header>

  <form id="form" class="form-card" autocomplete="off">
    <label class="field-label" for="prompt">Prompt / Instructions</label>
    <textarea id="prompt" name="prompt" placeholder="Describe the essay topic or paste assignment instructions…"></textarea>

    <label class="field-label" for="files">Upload Files</label>
    <div class="file-zone">
      <input type="file" id="files" name="files" multiple>
    </div>
    <div class="hint">PDF, DOCX, images, or text files with assignment materials.</div>

    <label class="field-label" for="sources">Your Sources <span class="optional-mark">(optional)</span></label>
    <div class="file-zone">
      <input type="file" id="sources" name="sources" multiple>
    </div>
    <div class="hint">PDF, DOCX, or text files of reference papers you want cited in the essay.</div>

    <div class="config-section" aria-labelledby="config-heading">
      <h2 class="config-section-title" id="config-heading">Options</h2>

      <label class="field-label">Academic Level <span class="optional-mark">(optional)</span></label>
      <div class="radio-group" role="radiogroup" aria-label="Academic level">
        <label class="radio-option"><input type="radio" name="academic_level" value=""> Not defined</label>
        <label class="radio-option"><input type="radio" name="academic_level" value="undergraduate"> Undergraduate</label>
        <label class="radio-option"><input type="radio" name="academic_level" value="postgraduate"> Postgraduate</label>
      </div>

      <div class="number-row">
        <div class="number-field">
          <label class="field-label" for="target_words">Target word count <span class="optional-mark">(optional)</span></label>
          <input type="number" id="target_words" name="target_words" min="100" step="100" placeholder="e.g. 3000">
        </div>
        <div class="number-field">
          <label class="field-label" for="min_sources">Minimum sources <span class="optional-mark">(optional)</span></label>
          <input type="number" id="min_sources" name="min_sources" min="1" max="200" step="1" placeholder="auto">
          <small id="min_sources_hint" style="color:#888;font-size:0.85em;display:none;margin-top:.25rem"></small>
        </div>
      </div>

      <label class="checkbox-option" for="fast_track">
        <input type="checkbox" id="fast_track" name="fast_track" value="1">
        <span>Fast track — skip the later step that asks for optional source PDFs</span>
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="primary-submit" id="submit-btn">Generate Essay</button>
    </div>
  </form>

  <div id="status-area"></div>

  <div id="job-session-bar" class="job-session-bar" hidden>
    <p>This run is tied to your address bar — refresh anytime or bookmark the page to come back while the server works.</p>
    <button type="button" class="secondary-link" id="start-fresh-btn">Start a new essay</button>
  </div>

  <script>
    const form = document.getElementById('form');
    const statusArea = document.getElementById('status-area');
    const submitBtn = document.getElementById('submit-btn');

    /* --- Suggested sources (mirrors _suggested_sources in pipeline.py) --- */
    const SOURCES_PER_1K = 5;
    const MIN_SOURCES_FLOOR = 12;
    function suggestedSources(words) {
      if (!words || words <= 0) return 0;
      return Math.max(MIN_SOURCES_FLOOR, Math.round(SOURCES_PER_1K * 3 * Math.log2(1 + words / 1000)));
    }
    (function initSourceSuggest() {
      const twEl = document.getElementById('target_words');
      const msEl = document.getElementById('min_sources');
      const hintEl = document.getElementById('min_sources_hint');
      let userEdited = false;
      msEl.addEventListener('input', function() { userEdited = true; hintEl.style.display = 'none'; });
      twEl.addEventListener('input', function() {
        const w = parseInt(twEl.value, 10);
        if (!w || w <= 0) { hintEl.style.display = 'none'; return; }
        const s = suggestedSources(w);
        hintEl.textContent = 'Suggested: ' + s + ' sources';
        hintEl.style.display = 'block';
        if (!userEdited) { msEl.value = s; msEl.placeholder = String(s); }
      });
    })();
    let jobId = null;
    /** Avoid overwriting the form after the user edits post-job; one restore per job per page load. */
    let submitSnapshotAppliedForJob = null;
    let pollTimer = null;
    let downloadInProgress = false;
    /** Read-only HTML for submitted Q&A rounds; kept visible while the pipeline runs. */
    let clarificationsHistoryHtml = '';
    let optionalPdfRoundItems = [];
    let optionalPdfUploaded = {};

    const JOB_QUERY_PARAM = 'job';

    function readJobIdFromUrl() {
      const u = new URL(location.href);
      const raw = u.searchParams.get(JOB_QUERY_PARAM);
      if (!raw) return null;
      const id = raw.trim().toLowerCase();
      if (!/^[a-f0-9]{12}$/.test(id)) {
        u.searchParams.delete(JOB_QUERY_PARAM);
        const q = u.searchParams.toString();
        history.replaceState(null, '', u.pathname + (q ? '?' + q : '') + u.hash);
        return null;
      }
      return id;
    }

    function replaceJobInUrl(id) {
      const u = new URL(location.href);
      if (id) u.searchParams.set(JOB_QUERY_PARAM, id);
      else u.searchParams.delete(JOB_QUERY_PARAM);
      const q = u.searchParams.toString();
      history.replaceState(null, '', u.pathname + (q ? '?' + q : '') + u.hash);
    }

    function updateJobSessionBar() {
      const bar = document.getElementById('job-session-bar');
      if (bar) bar.hidden = !jobId;
    }

    function setActiveJobId(id) {
      if (jobId !== id) {
        submitSnapshotAppliedForJob = null;
      }
      jobId = id;
      replaceJobInUrl(id);
      updateJobSessionBar();
    }

    function abandonRun() {
      clearInterval(pollTimer);
      pollTimer = null;
      setActiveJobId(null);
      clarificationsHistoryHtml = '';
      optionalPdfRoundItems = [];
      optionalPdfUploaded = {};
      statusArea.innerHTML = '';
      submitBtn.disabled = false;
    }

    function resetFormToCleanState() {
      form.reset();
      const filesInput = document.getElementById('files');
      if (filesInput) filesInput.value = '';
    }

    function tryResumeFromUrl() {
      const id = readJobIdFromUrl();
      if (!id) return false;
      clarificationsHistoryHtml = '';
      optionalPdfRoundItems = [];
      optionalPdfUploaded = {};
      setActiveJobId(id);
      submitBtn.disabled = true;
      statusArea.innerHTML =
        '<p class="hint resume-hint">Resuming your run — you can refresh this page or bookmark the URL while the server works.</p>' +
        '<div class="pipeline-status"><span class="spinner"></span> Connecting…</div>';
      clearInterval(pollTimer);
      pollTimer = setInterval(pollStatus, 3000);
      void pollStatus();
      return true;
    }

    document.getElementById('start-fresh-btn')?.addEventListener('click', () => abandonRun());

    window.addEventListener('load', () => {
      queueMicrotask(() => {
        if (!tryResumeFromUrl()) resetFormToCleanState();
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearInterval(pollTimer);
      pollTimer = null;
      setActiveJobId(null);
      submitBtn.disabled = true;
      clarificationsHistoryHtml = '';
      statusArea.innerHTML = '<span class="spinner"></span> Submitting…';

      const fd = new FormData();
      fd.append('prompt', document.getElementById('prompt').value);
      const tw = document.getElementById('target_words').value;
      if (tw) fd.append('target_words', tw);
      const ms = document.getElementById('min_sources').value;
      if (ms) fd.append('min_sources', ms);
      const al = document.querySelector('input[name="academic_level"]:checked');
      if (al && al.value) fd.append('academic_level', al.value);
      const filesInput = document.getElementById('files');
      for (const f of filesInput.files) fd.append('files', f);
      const sourcesInput = document.getElementById('sources');
      for (const f of sourcesInput.files) fd.append('sources', f);
      if (document.getElementById('fast_track')?.checked) fd.append('fast_track', '1');

      try {
        const res = await fetch('/submit', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.error) { showError(data.error); return; }
        setActiveJobId(data.job_id);
        statusArea.innerHTML = '<span class="spinner"></span> Starting…';
        pollTimer = setInterval(pollStatus, 3000);
        void pollStatus();
      } catch (err) {
        showError('Failed to submit: ' + err.message);
      }
    });

    async function pollStatus() {
      if (!jobId) return;
      try {
        const res = await fetch(`/status/${jobId}`);
        if (res.status === 404) {
          clearInterval(pollTimer);
          showJobGone(
            'This job is no longer on the server (expired timeout or already cleaned up). If you already downloaded your ZIP, that is expected.'
          );
          return;
        }
        const data = await res.json();
        syncHistoryFromStatus(data);
        applySubmitSnapshotFromStatus(data);

        if (data.status === 'running') {
          const pipelineEl = statusArea.querySelector('.pipeline-status');
          const line = runningStatusHtml(data.stage);
          if (pipelineEl) {
            pipelineEl.innerHTML = line;
          } else if (!clarificationsHistoryHtml) {
            statusArea.innerHTML = line;
          }
        } else if (data.status === 'questions') {
          clearInterval(pollTimer);
          showQuestions(data.questions);
        } else if (data.status === 'optional_pdfs') {
          clearInterval(pollTimer);
          showOptionalPdfPrompt(data.optional_pdf_items || []);
        } else if (data.status === 'done') {
          clearInterval(pollTimer);
          statusArea.innerHTML =
            clarificationsHistoryHtml +
            '<p>✅ Essay generated!</p>' +
            '<button type="button" class="download-link" id="download-btn">Download ZIP</button>' +
            '<p class="hint">The server removes this package after you download it, or automatically after a timeout if you leave it here.</p>';
          submitBtn.disabled = false;
          const dl = document.getElementById('download-btn');
          if (dl) dl.addEventListener('click', () => { void downloadZip(); });
        } else if (data.status === 'error') {
          clearInterval(pollTimer);
          showError(data.error || 'Unknown error');
        }
      } catch (err) {
        /* ignore transient fetch errors */
      }
    }

    function clarificationsHistoryFromServer(rounds) {
      if (!rounds || !rounds.length) return '';
      let html = '';
      rounds.forEach((round) => {
        html += '<section class="clarifications-round"><h3>Your clarifications</h3>';
        (round.items || []).forEach((row) => {
          const q = row.question || '';
          const a = row.answer != null ? row.answer : '—';
          html += `<div class="question-block answered"><p>${esc(q)}</p><p class="user-answer">${esc(a)}</p></div>`;
        });
        html += '</section>';
      });
      return html;
    }

    function optionalPdfHistoryFromServer(rounds) {
      if (!rounds || !rounds.length) return '';
      let html = '';
      rounds.forEach((round) => {
        html += '<section class="clarifications-round"><h3>Optional PDFs</h3>';
        (round.items || []).forEach((row) => {
          const t = row.title || '';
          const a = row.answer != null ? row.answer : '—';
          html += `<div class="question-block answered"><p>${esc(t)}</p><p class="user-answer">${esc(a)}</p></div>`;
        });
        html += '</section>';
      });
      return html;
    }

    /** Rebuild read-only history from server (survives page reload). */
    function syncHistoryFromStatus(data) {
      if (!data || typeof data !== 'object') return;
      if (!('clarification_rounds' in data) && !('optional_pdf_rounds' in data)) return;
      clarificationsHistoryHtml =
        clarificationsHistoryFromServer(data.clarification_rounds || []) +
        optionalPdfHistoryFromServer(data.optional_pdf_rounds || []);
    }

    /** Restore prompt / options from server (survives page reload). Runs once per active job. */
    function applySubmitSnapshotFromStatus(data) {
      if (!jobId || !data || !data.submit || typeof data.submit !== 'object') return;
      if (submitSnapshotAppliedForJob === jobId) return;
      const s = data.submit;
      const pe = document.getElementById('prompt');
      if (pe && typeof s.prompt === 'string') pe.value = s.prompt;
      const twEl = document.getElementById('target_words');
      if (twEl) twEl.value = s.target_words != null ? String(s.target_words) : '';
      const msEl = document.getElementById('min_sources');
      if (msEl) msEl.value = s.min_sources != null ? String(s.min_sources) : '';
      const level = s.academic_level != null ? String(s.academic_level) : '';
      document.querySelectorAll('input[name="academic_level"]').forEach((r) => {
        r.checked = r.value === level;
      });
      submitSnapshotAppliedForJob = jobId;
    }

    function showQuestions(questions) {
      let html = clarificationsHistoryHtml;
      html += '<h3>Assignment has gaps — please clarify:</h3>';
      html += '<p class="clarify-hint" style="font-size:.9rem;color:#64748b;margin:.35rem 0 .75rem">Suggested answers are pre-selected; change any that look wrong.</p>';
      html += '<div class="clarification-pending">';
      questions.forEach((q, i) => {
        const nOpt = (q.options && q.options.length) ? q.options.length : 0;
        let sug = Number.isInteger(q.suggested_option_index) ? q.suggested_option_index : 0;
        if (nOpt > 0) {
          sug = Math.max(0, Math.min(sug, nOpt - 1));
        } else {
          sug = 0;
        }
        html += `<div class="question-block"><p>${i + 1}. ${esc(q.question)}</p>`;
        q.options.forEach((opt, j) => {
          const letter = String.fromCharCode(97 + j);
          const checked = j === sug ? ' checked' : '';
          html += `<label><input type="radio" name="q${i + 1}" value="${letter}"${checked}> ${letter}) ${esc(opt)}</label>`;
        });
        const otherLetter = String.fromCharCode(97 + q.options.length);
        html += `<label class="other-row"><input type="radio" name="q${i + 1}" value="other"> <span>${otherLetter}) Other:</span> <input type="text" class="other-text" data-q="${i + 1}" placeholder="Type your answer…" style="flex:1;min-width:12rem;padding:.3rem .5rem;border:1px solid #ccc;border-radius:4px;font-size:.9rem"></label>`;
        html += '</div>';
      });
      html += '<button id="answer-btn" onclick="submitAnswers()">Submit Answers</button>';
      html += ' <button onclick="skipQuestions()" style="background:#64748b">Skip</button>';
      html += '</div>';
      statusArea.innerHTML = html;

      // Auto-select "other" radio when typing in the text field
      document.querySelectorAll('.other-text').forEach(input => {
        input.addEventListener('focus', () => {
          const radio = input.closest('label').querySelector('input[type=radio]');
          radio.checked = true;
        });
      });
    }

    async function submitAnswers() {
      const parts = [];
      document.querySelectorAll('.clarification-pending .question-block').forEach((block, i) => {
        const checked = block.querySelector('input[type=radio]:checked');
        if (checked) {
          if (checked.value === 'other') {
            const textInput = block.querySelector('.other-text');
            if (textInput && textInput.value.trim()) {
              parts.push(`${i + 1}. ${textInput.value.trim()}`);
            }
          } else {
            parts.push(`${i + 1}. ${checked.value}`);
          }
        }
      });
      await sendAnswers(parts.join(', '));
    }

    async function skipQuestions() {
      await sendAnswers('');
    }

    function appendClarificationsSnapshot() {
      const blocks = document.querySelectorAll('#status-area .clarification-pending .question-block');
      if (!blocks.length) return;
      let html = '<section class="clarifications-round"><h3>Your clarifications</h3>';
      blocks.forEach((block) => {
        const qText = block.querySelector('p')?.textContent || '';
        const checked = block.querySelector('input[type=radio]:checked');
        let ans = '—';
        if (checked) {
          if (checked.value === 'other') {
            const textInput = block.querySelector('.other-text');
            const t = textInput?.value.trim();
            ans = t || '(Other — empty)';
          } else {
            const lab = checked.closest('label');
            let t = lab ? lab.textContent.trim() : '';
            ans = t.replace(/^[a-z]\)\s*/i, '').trim() || checked.value;
          }
        }
        html += `<div class="question-block answered"><p>${esc(qText)}</p><p class="user-answer">${esc(ans)}</p></div>`;
      });
      html += '</section>';
      clarificationsHistoryHtml += html;
    }

    async function sendAnswers(answers) {
      appendClarificationsSnapshot();
      const fd = new FormData();
      fd.append('answers', answers);
      await fetch(`/answer/${jobId}`, { method: 'POST', body: fd });
      statusArea.innerHTML =
        clarificationsHistoryHtml +
        '<div class="pipeline-status"><span class="spinner"></span> Starting…</div>';
      pollTimer = setInterval(pollStatus, 3000);
      void pollStatus();
    }

    function showOptionalPdfPrompt(items) {
      optionalPdfRoundItems = items;
      optionalPdfUploaded = {};
      let html = clarificationsHistoryHtml;
      html += '<h3>Optional: upload full-text PDFs</h3>';
      html += '<p class="hint">These sources were used with metadata or abstract only. Add a PDF from your device or paste a direct PDF link (e.g. open access). Optional.</p>';
      html += '<div class="clarification-pending optional-pdf-pending">';
      items.forEach((row, idx) => {
        const title = esc(row.title || row.source_id);
        const doiUrl = row.doi_url ? esc(row.doi_url) : '';
        const doiLabel = row.doi ? esc(row.doi) : '';
        html += `<div class="optional-pdf-row" data-idx="${idx}">`;
        html += `<h4>${title}</h4>`;
        if (doiUrl) {
          html += `<div class="doi-line"><a href="${doiUrl}" target="_blank" rel="noopener noreferrer">DOI: ${doiLabel || doiUrl}</a></div>`;
        }
        html += `<div class="upload-row">`;
        html += `<input type="file" accept=".pdf,application/pdf" class="opt-pdf-file" data-idx="${idx}" title="PDF file" />`;
        html += `<button type="button" class="opt-pdf-upload-btn" data-idx="${idx}">Upload</button>`;
        html += `<span class="opt-or">or</span>`;
        html += `<input type="url" inputmode="url" autocomplete="off" class="opt-pdf-url" data-idx="${idx}" placeholder="https://…pdf" />`;
        html += `<button type="button" class="opt-pdf-url-btn" data-idx="${idx}">Fetch</button>`;
        html += `<span class="upload-status opt-pdf-status" data-idx="${idx}"></span>`;
        html += `</div></div>`;
      });
      html += '<button type="button" id="optional-pdf-continue">Continue</button>';
      html += ' <button type="button" id="optional-pdf-continue-skip" style="background:#64748b">Skip (no uploads)</button>';
      html += '</div>';
      statusArea.innerHTML = html;

      document.querySelectorAll('.opt-pdf-upload-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.getAttribute('data-idx'), 10);
          const row = items[idx];
          if (!row) return;
          const sid = row.source_id;
          const fileInput = document.querySelector(`.opt-pdf-file[data-idx="${idx}"]`);
          const st = document.querySelector(`.opt-pdf-status[data-idx="${idx}"]`);
          if (!fileInput || !fileInput.files || !fileInput.files[0]) {
            if (st) { st.textContent = 'Choose a file first.'; st.classList.add('err'); }
            return;
          }
          void uploadOptionalPdf(sid, fileInput.files[0], st, fileInput);
        });
      });
      document.querySelectorAll('.opt-pdf-url-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.getAttribute('data-idx'), 10);
          const row = items[idx];
          if (!row) return;
          const sid = row.source_id;
          const urlInput = document.querySelector(`.opt-pdf-url[data-idx="${idx}"]`);
          const st = document.querySelector(`.opt-pdf-status[data-idx="${idx}"]`);
          const u = urlInput && urlInput.value.trim();
          if (!u) {
            if (st) { st.textContent = 'Paste a PDF URL.'; st.classList.add('err'); }
            return;
          }
          void fetchOptionalPdfUrl(sid, u, st, urlInput);
        });
      });
      const cont = document.getElementById('optional-pdf-continue');
      const skip = document.getElementById('optional-pdf-continue-skip');
      if (cont) cont.addEventListener('click', () => { void finishOptionalPdfStep(); });
      if (skip) skip.addEventListener('click', () => { void finishOptionalPdfStep(); });
    }

    async function uploadOptionalPdf(sourceId, file, statusEl, fileInput) {
      if (!statusEl) return;
      statusEl.classList.remove('err');
      statusEl.textContent = 'Uploading…';
      const fd = new FormData();
      fd.append('source_id', sourceId);
      fd.append('file', file);
      try {
        const res = await fetch(`/optional-pdf/${jobId}`, { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          statusEl.textContent = data.error || 'Upload failed';
          statusEl.classList.add('err');
          return;
        }
        optionalPdfUploaded[sourceId] = 'file';
        statusEl.textContent = 'Saved — full text will be used.';
        statusEl.classList.remove('err');
        if (fileInput) fileInput.value = '';
      } catch (e) {
        statusEl.textContent = 'Network error';
        statusEl.classList.add('err');
      }
    }

    async function fetchOptionalPdfUrl(sourceId, url, statusEl, urlInput) {
      if (!statusEl) return;
      statusEl.classList.remove('err');
      statusEl.textContent = 'Fetching…';
      const fd = new FormData();
      fd.append('source_id', sourceId);
      fd.append('pdf_url', url);
      try {
        const res = await fetch(`/optional-pdf/${jobId}`, { method: 'POST', body: fd });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          statusEl.textContent = data.error || 'Fetch failed';
          statusEl.classList.add('err');
          return;
        }
        optionalPdfUploaded[sourceId] = 'url';
        statusEl.textContent = 'Saved — full text will be used.';
        statusEl.classList.remove('err');
        if (urlInput) urlInput.value = '';
      } catch (e) {
        statusEl.textContent = 'Network error';
        statusEl.classList.add('err');
      }
    }

    function appendOptionalPdfSnapshot() {
      const pending = document.querySelector('.optional-pdf-pending');
      if (!pending || !optionalPdfRoundItems.length) return;
      let html = '<section class="clarifications-round"><h3>Optional PDFs</h3>';
      optionalPdfRoundItems.forEach((row) => {
        const sid = row.source_id;
        const how = optionalPdfUploaded[sid];
        let ans = '— skipped / none';
        if (how === 'file') ans = 'PDF from file';
        else if (how === 'url') ans = 'PDF from URL';
        html += `<div class="question-block answered"><p>${esc(row.title || sid)}</p><p class="user-answer">${esc(ans)}</p></div>`;
      });
      html += '</section>';
      clarificationsHistoryHtml += html;
    }

    async function finishOptionalPdfStep() {
      appendOptionalPdfSnapshot();
      await fetch(`/optional-pdf/${jobId}/done`, { method: 'POST' });
      statusArea.innerHTML =
        clarificationsHistoryHtml +
        '<div class="pipeline-status"><span class="spinner"></span> Reading sources…</div>';
      pollTimer = setInterval(pollStatus, 3000);
      void pollStatus();
    }

    function showError(msg) {
      clearInterval(pollTimer);
      pollTimer = null;
      statusArea.innerHTML =
        clarificationsHistoryHtml + `<p class="error">❌ ${esc(msg)}</p>`;
      submitBtn.disabled = false;
    }

    function showJobGone(msg) {
      clearInterval(pollTimer);
      pollTimer = null;
      statusArea.innerHTML =
        clarificationsHistoryHtml +
        `<p class="job-gone">${esc(msg)}</p>`;
      submitBtn.disabled = false;
      setActiveJobId(null);
    }

    async function downloadZip() {
      if (!jobId || downloadInProgress) return;
      downloadInProgress = true;
      const btn = document.getElementById('download-btn');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Preparing…';
      }
      try {
        const res = await fetch(`/download/${jobId}`);
        if (res.status === 404) {
          showJobGone(
            'Download is no longer available. The job may have expired or was already downloaded.'
          );
          return;
        }
        if (!res.ok) {
          showError('Download failed (' + res.status + '). Try again or start a new run.');
          return;
        }
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'essay_' + jobId + '.zip';
        a.rel = 'noopener';
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        statusArea.innerHTML =
          clarificationsHistoryHtml +
          '<p>✅ Download started. You can submit another essay when you are ready.</p>';
        setActiveJobId(null);
        submitBtn.disabled = false;
      } catch (err) {
        showError('Download failed: ' + err.message);
      } finally {
        downloadInProgress = false;
        if (btn && document.body.contains(btn)) {
          btn.disabled = false;
          btn.textContent = 'Download ZIP';
        }
      }
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    /** Map server pipeline step id to a short UI label. */
    function formatStage(raw) {
      if (!raw || raw === 'unknown') return 'Working';
      const w = /^write:(\d+)$/.exec(raw);
      if (w) return 'Writing (section ' + w[1] + ')';
      const r = /^review:(\d+)$/.exec(raw);
      if (r) return 'Reviewing (section ' + r[1] + ')';
      const labels = {
        intake: 'Intake',
        validate: 'Validation',
        plan: 'Planning',
        research: 'Research',
        read_sources: 'Reading sources',
        write: 'Writing',
        review: 'Reviewing',
        export: 'Exporting',
      };
      if (labels[raw]) return labels[raw];
      return raw.replace(/_/g, ' ');
    }

    function runningStatusHtml(stage) {
      return '<span class="spinner"></span> ' + esc(formatStage(stage)) + '…';
    }
  </script>
</body>
</html>
