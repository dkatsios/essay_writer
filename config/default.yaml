models:
  orchestrator: "google_genai:gemini-2.5-flash"
  planner: "google_genai:gemini-2.5-flash"
  researcher: "google_genai:gemini-2.5-flash"
  cataloguer: "google_genai:gemini-2.5-flash"
  extractor: "google_genai:gemini-2.5-flash"
  writer: "google_genai:gemini-2.5-flash"
  reviewer: "google_genai:gemini-2.5-flash"
  builder: "google_genai:gemini-2.5-flash"

pipeline:
  checkpoint_after_draft_plan: false
  checkpoint_after_final_plan: true
  checkpoint_after_review: false
  default_mode: "autonomous"

writing:
  word_count_tolerance: 0.10
  max_word_count_retries: 2
  long_essay_threshold: 3000
  intro_strategy: "placeholder"

formatting:
  font: "Times New Roman"
  font_size: 12
  line_spacing: 1.5
  margins_cm: 2.5
  citation_style: "apa7"
  page_numbers: "bottom_center"
  paragraph_indent: true

search:
  max_sources_per_direction: 5
  prefer_greek_sources: true
  search_language: ["el", "en"]

paths:
  output_dir: "./output"
  skills_dir: "/skills/"
